name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend assets
        run: npm run build

      - name: Compile Python
        run: python -m compileall app tests

      - name: Run tests
        run: pytest -q
        env:
          NOVELHUB_APP_ENV: development
          NOVELHUB_PASSWORD: test-password
          NOVELHUB_SECRET_KEY: test-secret-key-change-me
          NOVELHUB_ENCRYPTION_KEY: test-encryption-key-change-me
          NOVELHUB_VAULT_ROOT: /tmp/novelhub-vault
          NOVELHUB_BACKUP_ROOT: /tmp/novelhub-backups
          NOVELHUB_DB_PATH: /tmp/novelhub-test.db
