{% if error %}
<div class="save-error hidden"
     data-error-code="{{ error_code or '' }}"
     data-current-mtime="{{ current_mtime or '' }}"
     data-loaded-mtime="{{ loaded_mtime or '' }}"
     data-current-hash="{{ current_hash or '' }}"
     data-loaded-hash="{{ loaded_hash or '' }}">{{ error }}</div>
{% else %}
<div class="save-ok hidden" data-saved-at="{{ saved_at }}" data-new-mtime="{{ new_mtime }}"></div>
{% endif %}
