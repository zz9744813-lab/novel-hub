<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Novel Hub{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <div class="app-shell {% block body_class %}{% endblock %}">
    {% block topbar %}
    <header class="topbar">
      <div class="topbar-left"><a href="/">Novel Hub</a>{% if project %}<span class="crumb">/ {{ project }}</span>{% endif %}</div>
      <div class="topbar-center" id="global-save-state">Ready</div>
      <div class="topbar-right">
        <button class="icon-btn" data-action="theme">🌗</button>
        <a class="icon-btn" href="/settings">Settings</a>
        <a class="icon-btn" href="/logout">退出</a>
      </div>
    </header>
    {% endblock %}
    <main>{% block content %}{% endblock %}</main>
  </div>
  <div id="toast" class="toast" aria-live="polite"></div>
  <script src="/static/js/ui.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
