<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Novel Hub{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script>
    const I18N = {
      'zh-CN': {
        'nav_pipeline': 'AI 流水线',
        'nav_settings': '设置',
        'nav_logout': '退出',
        'system_ready': '系统就绪',
        'pipeline_title': 'AI 创作流水线',
        'pipeline_current': '当前项目',
        'pipeline_unselected': '未选择 (请在下方选择或创建)',
        'pipeline_enter': '进入流水线',
        'pipeline_add_card': '添加卡片',
        'pipeline_ai_gen': 'AI 生成',
        'pipeline_save': '保存流水线状态',
        'pipeline_empty': '当前阶段暂无卡片。点击右上角添加卡片或由 AI 自动生成。',
        'proj_chars': '角色设定',
        'proj_world': '世界观设定',
        'all_chapters': '全部章节',
        'settings_title': '系统设置',
        'save_ai_settings': '保存 AI 配置',
      },
      'en-US': {
        'nav_pipeline': 'AI Pipeline',
        'nav_settings': 'Settings',
        'nav_logout': 'Logout',
        'system_ready': 'System Ready',
        'pipeline_title': 'AI Writing Pipeline',
        'pipeline_current': 'Current Project',
        'pipeline_unselected': 'Not selected (Please select below)',
        'pipeline_enter': 'Enter Pipeline',
        'pipeline_add_card': 'Add Card',
        'pipeline_ai_gen': 'AI Generate',
        'pipeline_save': 'Save Pipeline State',
        'pipeline_empty': 'No cards in this stage. Click top right to add or generate with AI.',
        'proj_chars': 'Characters',
        'proj_world': 'World',
        'all_chapters': 'All Chapters',
        'settings_title': 'Settings',
        'save_ai_settings': 'Save AI Settings',
      },
      'ja-JP': {
        'nav_pipeline': 'AI パイプライン',
        'nav_settings': '設定',
        'nav_logout': 'ログアウト',
        'system_ready': 'システム準備完了',
        'pipeline_title': 'AI 創作パイプライン',
        'pipeline_current': '現在のプロジェクト',
        'pipeline_unselected': '未選択（下で選択してください）',
        'pipeline_enter': 'パイプラインに入る',
        'pipeline_add_card': 'カードを追加',
        'pipeline_ai_gen': 'AI 生成',
        'pipeline_save': '状態を保存',
        'pipeline_empty': 'このステージにはカードがありません。右上から追加またはAI生成してください。',
        'proj_chars': 'キャラクター',
        'proj_world': '世界観',
        'all_chapters': 'すべての章',
        'settings_title': '設定',
        'save_ai_settings': 'AI 設定を保存',
      }
    };

    document.addEventListener('alpine:init', () => {
        Alpine.store('i18n', {
            locale: '{{ get_locale(request) }}',
            t(key) {
                return I18N[this.locale]?.[key] || I18N['zh-CN'][key] || key;
            }
        });
    });

    tailwind.config = {
      darkMode: ['class', '[data-theme="dark"]'],
      theme: {
        extend: {
          colors: {
            bg: 'var(--bg)',
            panel: 'var(--panel)',
            border_color: 'var(--border)',
            text_color: 'var(--text)',
            muted: 'var(--muted)',
            accent: 'var(--accent)',
            danger: 'var(--danger)',
            sidebar: 'var(--sidebar)',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            serif: ['Noto Serif SC', 'serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body x-data="{ sidebarOpen: true, theme: localStorage.getItem('theme') || 'dark' }"
      :data-theme="theme"
      x-init="$watch('theme', val => localStorage.setItem('theme', val))"
      class="bg-bg text-text_color font-sans antialiased selection:bg-accent/30 min-h-screen flex flex-col">
  <div class="app-shell flex-1 flex flex-col {% block body_class %}{% endblock %}">
    {% block topbar %}
    <header class="h-14 border-b border-border_color flex items-center justify-between px-4 bg-bg/95 backdrop-blur sticky top-0 z-20">
      <div class="flex items-center gap-2 text-sm font-medium">
        <a href="/" class="hover:text-accent transition-colors flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            Novel Hub
        </a>
        {% if project %}
        <span class="text-muted">/</span>
        <a href="/projects/{{ project }}" class="text-muted hover:text-text_color transition-colors">{{ project }}</a>
        {% endif %}
      </div>
      <div class="text-xs text-muted font-mono" id="global-save-state" x-text="$store.i18n.t('system_ready')">System Ready</div>
      <div class="hidden md:flex items-center gap-3">
{% if project %}
<a href="/projects/{{ project }}/outline" class="flex items-center gap-1.5 px-3 py-1.5 rounded-md hover:bg-panel transition-colors text-sm">大纲</a>
<a href="/projects/{{ project }}/threads-board" class="flex items-center gap-1.5 px-3 py-1.5 rounded-md hover:bg-panel transition-colors text-sm">伏笔</a>
{% endif %}
        

        <!-- Language Switcher -->
        <div class="relative" x-data="{ open: false }">
          <button @click="open = !open" @click.away="open = false" class="flex items-center gap-1 p-1.5 rounded-md text-muted hover:text-text_color hover:bg-panel border border-transparent hover:border-border_color transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path></svg>
          </button>
          <div x-show="open" style="display: none;" class="absolute right-0 mt-2 w-32 bg-panel border border-border_color rounded-lg shadow-lg py-1 z-50">
            <form action="/settings/locale" method="post">
              <button type="submit" name="locale" value="zh-CN" class="w-full text-left px-4 py-2 text-sm hover:bg-bg transition-colors {% if get_locale(request) == 'zh-CN' %}text-accent font-medium{% endif %}">简体中文</button>
              <button type="submit" name="locale" value="en-US" class="w-full text-left px-4 py-2 text-sm hover:bg-bg transition-colors {% if get_locale(request) == 'en-US' %}text-accent font-medium{% endif %}">English</button>
              <button type="submit" name="locale" value="ja-JP" class="w-full text-left px-4 py-2 text-sm hover:bg-bg transition-colors {% if get_locale(request) == 'ja-JP' %}text-accent font-medium{% endif %}">日本語</button>
            </form>
          </div>
        </div>

        <button @click="theme = theme === 'dark' ? 'light' : 'dark'" class="p-1.5 rounded-md text-muted hover:text-text_color hover:bg-panel border border-transparent hover:border-border_color transition-all">
          <svg x-show="theme === 'dark'" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
          <svg x-show="theme === 'light'" class="w-5 h-5" style="display: none;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
        <a href="/settings" class="p-1.5 rounded-md text-muted hover:text-text_color hover:bg-panel border border-transparent hover:border-border_color transition-all" :title="$store.i18n.t('nav_settings')">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        </a>
        <a href="/logout" class="p-1.5 rounded-md text-muted hover:text-danger hover:bg-danger/10 border border-transparent transition-all" :title="$store.i18n.t('nav_logout')">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
        </a>
      </div>
      <div x-data="{ navOpen: false }" class="md:hidden">
        <button @click="navOpen = !navOpen" class="p-2 rounded-md text-muted hover:text-text_color hover:bg-panel border border-border_color" aria-label="Open navigation">☰</button>
        <div x-show="navOpen"
             x-transition
             @click.outside="navOpen = false"
             style="display: none;"
             class="fixed inset-y-0 right-0 w-64 bg-panel z-40 p-6 flex flex-col gap-3 border-l border-border_color shadow-xl">
          <a href="/" class="hover:text-accent">仪表盘</a>
          {% if project %}
          <a href="/projects/{{ project }}" class="hover:text-accent">{{ project }}</a>
          <a href="/projects/{{ project }}/outline" class="hover:text-accent">大纲</a>
          <a href="/projects/{{ project }}/threads-board" class="hover:text-accent">伏笔</a>
          <a href="/projects/{{ project }}/timeline" class="hover:text-accent">时间线</a>
          <a href="/projects/{{ project }}/entities" class="hover:text-accent">实体</a>
          {% endif %}
          <a href="/settings" class="hover:text-accent">设置</a>
          <a href="/logout" class="hover:text-danger">登出</a>
        </div>
      </div>
    </header>
    {% endblock %}
    <main class="flex-1 p-4 w-full max-w-7xl mx-auto flex flex-col">{% block content %}{% endblock %}</main>
  </div>
  <div id="toast" class="toast" aria-live="polite"></div>
  <script src="/static/js/ui.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
