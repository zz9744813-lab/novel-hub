{% extends "base.html" %}
{% block title %}Export · Novel Hub{% endblock %}
{% block content %}
<section class="max-w-4xl mx-auto w-full flex flex-col gap-6">
  <div class="bg-panel border border-border_color rounded-xl p-6 shadow-sm flex items-center justify-between">
    <div>
      <h2 class="text-2xl font-semibold mb-2 flex items-center gap-3">
        <svg class="w-6 h-6 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
        导出中心
      </h2>
      <p class="text-muted text-sm">将项目章节合并为 TXT，导出文件默认保存在各项目 <code>exports/</code> 目录。</p>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    {% for p in projects %}
    <article class="bg-panel border border-border_color rounded-xl p-5 shadow-sm flex flex-col group">
      <div class="flex items-start justify-between mb-4">
        <h3 class="text-lg font-semibold group-hover:text-accent transition-colors">{{ p.name }}</h3>
        <span class="text-xs text-muted font-medium bg-bg px-2 py-1 rounded border border-border_color shrink-0">{{ p.total_words }} 字</span>
      </div>

      <p class="text-sm text-muted mb-6 flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
        共包含 {{ p.chapter_count }} 个章节
      </p>

      <div class="flex items-center gap-3 mt-auto pt-4 border-t border-border_color/50">
        <button class="flex-1 flex items-center justify-center gap-2 bg-accent text-white hover:bg-accent/90 border border-accent rounded-lg px-4 py-2 text-sm font-medium transition-colors" hx-post="/export/{{ p.name }}" hx-target="#export-result">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
          生成 TXT
        </button>
        <a class="flex-1 flex items-center justify-center gap-2 bg-bg border border-border_color hover:border-accent/50 rounded-lg px-4 py-2 text-sm font-medium transition-colors" href="/projects/{{ p.name }}/export">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
          直接下载
        </a>
      </div>
    </article>
    {% else %}
    <div class="md:col-span-2 border-2 border-dashed border-border_color rounded-xl p-12 text-center text-muted">
      <p>暂无可导出的项目。</p>
    </div>
    {% endfor %}
  </div>

  <div id="export-result" class="empty:hidden"></div>
</section>
{% endblock %}
