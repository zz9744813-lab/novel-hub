{% extends "base.html" %}
{% block title %}Relationship Graph · {{ project }} · Novel Hub{% endblock %}

{% block content %}
<div class="flex flex-col h-[calc(100vh-8rem)] gap-4">
    <div class="flex items-center justify-between">
        <h2 class="text-2xl font-bold">Relationship Graph</h2>
        <div class="flex gap-4">
            <select id="kind-filter" class="bg-panel border border-border_color rounded px-3 py-1 text-sm focus:outline-none">
                <option value="all">All Types</option>
                <option value="character">Characters Only</option>
                <option value="world">World/Places</option>
            </select>
            <button onclick="resetZoom()" class="text-xs text-accent hover:underline">Reset Zoom</button>
        </div>
    </div>

    <div class="flex-1 bg-panel border border-border_color rounded-2xl overflow-hidden relative shadow-inner" id="graph-container">
        <svg id="graph-svg" class="w-full h-full cursor-move"></svg>
        <div id="tooltip" class="absolute pointer-events-none bg-bg/90 backdrop-blur border border-border_color p-3 rounded-lg shadow-xl text-xs hidden z-50"></div>
    </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const project = "{{ project }}";
const svg = d3.select("#graph-svg");
const container = document.getElementById('graph-container');
let width = container.clientWidth;
let height = container.clientHeight;

const g = svg.append("g");
const zoom = d3.zoom().on("zoom", (e) => g.attr("transform", e.transform));
svg.call(zoom);

function resetZoom() {
    svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
}

async function initGraph() {
    const [entRes, relRes] = await Promise.all([
        fetch(`/api/entities?project=${project}`),
        fetch(`/api/entity-relations?project=${project}`)
    ]);
    const {entities} = await entRes.json();
    const {relations} = await relRes.json(); // Wait, I need an API for relations

    // Mapping relations to D3 format
    const nodes = entities.map(e => ({ id: e.id, name: e.name, kind: e.kind }));
    const links = relations.map(r => ({ source: r.source_id, target: r.target_id, type: r.relation_type }));

    const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(150))
        .force("charge", d3.forceManyBody().strength(-300))
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("collision", d3.forceCollide().radius(50));

    const link = g.append("g")
        .selectAll("line")
        .data(links)
        .join("line")
        .attr("stroke", "var(--border_color)")
        .attr("stroke-width", 1.5)
        .attr("stroke-opacity", 0.6);

    const node = g.append("g")
        .selectAll("g")
        .data(nodes)
        .join("g")
        .call(d3.drag()
            .on("start", dragstarted)
            .on("drag", dragged)
            .on("end", dragended))
        .on("click", (e, d) => {
            window.location.href = `/projects/${project}/entities/${d.id}`;
        })
        .on("mouseover", showTooltip)
        .on("mouseout", hideTooltip);

    node.append("circle")
        .attr("r", 12)
        .attr("fill", d => {
            if (d.kind === 'character') return "var(--accent)";
            if (d.kind === 'location') return "#10b981";
            return "#6b7280";
        })
        .attr("stroke", "var(--panel)")
        .attr("stroke-width", 2);

    node.append("text")
        .text(d => d.name)
        .attr("x", 16)
        .attr("y", 4)
        .attr("fill", "var(--text_color)")
        .attr("font-size", "10px")
        .attr("font-weight", "600");

    simulation.on("tick", () => {
        link
            .attr("x1", d => d.source.x)
            .attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x)
            .attr("y2", d => d.target.y);

        node.attr("transform", d => `translate(${d.x},${d.y})`);
    });

    function dragstarted(event) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        event.subject.fx = event.subject.x;
        event.subject.fy = event.subject.y;
    }
    function dragged(event) {
        event.subject.fx = event.x;
        event.subject.fy = event.y;
    }
    function dragended(event) {
        if (!event.active) simulation.alphaTarget(0);
        event.subject.fx = null;
        event.subject.fy = null;
    }
}

function showTooltip(event, d) {
    const tt = document.getElementById('tooltip');
    tt.innerHTML = `<div class="font-bold">${d.name}</div><div class="text-muted">${d.kind}</div>`;
    tt.style.left = (event.pageX + 10) + 'px';
    tt.style.top = (event.pageY + 10) + 'px';
    tt.classList.remove('hidden');
}
function hideTooltip() {
    document.getElementById('tooltip').classList.add('hidden');
}

initGraph();
</script>
{% endblock %}
